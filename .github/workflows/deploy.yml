name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Prepare metadata
        id: vars
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  verify-server:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Test server
        working-directory: server
        run: GOCACHE=/tmp/go-build go test ./...

  verify-client:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_BASE_PATH: ${{ secrets.RTC_PUBLIC_BASE_PATH }}
          VITE_WS_URL: ${{ secrets.RTC_PUBLIC_WS_URL }}
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify-server
      - verify-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner_lc }}/hybrid-rtc-platform-server:${{ needs.prepare.outputs.image_tag }}
            ghcr.io/${{ needs.prepare.outputs.owner_lc }}/hybrid-rtc-platform-server:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_BASE_PATH=${{ secrets.RTC_PUBLIC_BASE_PATH }}
            VITE_WS_URL=${{ secrets.RTC_PUBLIC_WS_URL }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner_lc }}/hybrid-rtc-platform-client:${{ needs.prepare.outputs.image_tag }}
            ghcr.io/${{ needs.prepare.outputs.owner_lc }}/hybrid-rtc-platform-client:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: deploy/docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cat > "${{ secrets.DEPLOY_PATH }}/.env" <<EOF
            GHCR_NAMESPACE=${{ needs.prepare.outputs.owner_lc }}
            IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}
            RTC_SERVER_ADDR=:8080
            EOF
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker network inspect web >/dev/null 2>&1 || docker network create web
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
